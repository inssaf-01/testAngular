<div class="p-8 max-w-6xl mx-auto">
  
  <!-- HEADER -->
  <div class="mb-10">
    <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">Tableau de bord</h2>
    <p class="text-sm text-gray-500 mt-1">Aperçu analytique de votre base utilisateurs.</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
    
    <!-- CARTE DU GRAPHIQUE (Prend 2 colonnes sur large écran) -->
    <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center">
      <div class="flex items-center justify-between w-full mb-8">
        <h3 class="font-bold text-gray-800">Répartition des rôles</h3>
        <span class="px-3 py-1 bg-indigo-50 text-indigo-700 text-[10px] font-bold uppercase rounded-full tracking-wider">Temps réel</span>
      </div>

      <div class="relative w-full max-w-[300px] aspect-square">
        <canvas
          baseChart
          [data]="pieChartData"
          [options]="pieChartOptions"
          [type]="pieChartType">
        </canvas>
        <!-- Texte au centre du donut (si cutout est utilisé) -->
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-3xl font-black text-gray-900">{{ adminCount + userCount }}</span>
          <span class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Total</span>
        </div>
      </div>
    </div>

    <!-- CARTES STATISTIQUES (Colonne de droite) -->
    <div class="space-y-6">
      
      <!-- Card Admin -->
      <div class="p-6 bg-white rounded-3xl shadow-sm border border-gray-100 flex items-center gap-5 hover:border-indigo-200 transition-colors group">
        <div class="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all duration-300">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <div>
          <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Administrateurs</p>
          <p class="text-3xl font-black text-gray-900">{{ adminCount }}</p>
        </div>
      </div>

      <!-- Card Users -->
      <div class="p-6 bg-white rounded-3xl shadow-sm border border-gray-100 flex items-center gap-5 hover:border-emerald-200 transition-colors group">
        <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-all duration-300">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </div>
        <div>
          <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Utilisateurs</p>
          <p class="text-3xl font-black text-gray-900">{{ userCount }}</p>
        </div>
      </div>

      <!-- Information additionnelle -->
      <div class="p-6 bg-gradient-to-br from-indigo-600 to-indigo-700 rounded-3xl shadow-lg shadow-indigo-200 text-white">
        <p class="text-sm opacity-80">Activité système</p>
        <p class="text-lg font-bold mt-1">Tout fonctionne normalement</p>
        <div class="mt-4 flex items-center gap-2">
            <span class="flex h-2 w-2 rounded-full bg-green-400 animate-pulse"></span>
            <span class="text-[10px] uppercase font-bold tracking-tighter">Serveur Actif</span>
        </div>
      </div>

    </div>

  </div>
</div>
