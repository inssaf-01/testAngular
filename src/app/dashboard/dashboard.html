<div class="p-8 max-w-6xl mx-auto">

  <!-- HEADER -->
  <div class="mb-10">
    <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">
      Tableau de bord
    </h2>
    <p class="text-sm text-gray-500 mt-1">
      Aperçu analytique de votre base utilisateurs.
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">

    <!-- GRAPH -->
    <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center">

      <div class="flex items-center justify-between w-full mb-8">
        <h3 class="font-bold text-gray-800">Répartition des rôles</h3>

        <span class="px-3 py-1 bg-indigo-50 text-indigo-700 text-[10px] font-bold uppercase rounded-full tracking-wider">
          Temps réel
        </span>
      </div>

      <div class="relative w-full max-w-[300px] aspect-square">

        <canvas
          baseChart
          [data]="pieChartData"
          [options]="pieChartOptions"
          [type]="pieChartType">
        </canvas>

        <!-- TOTAL -->
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-3xl font-black text-gray-900">
            {{ stats.reduce((sum, s) => sum + s.count, 0) }}
          </span>
          <span class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">
            Total
          </span>
        </div>

      </div>
    </div>

    <!-- DYNAMIC ROLE CARDS -->
    <div class="space-y-6">

      <div
        *ngFor="let s of stats"
        class="p-6 bg-white rounded-3xl shadow-sm border border-gray-100 flex items-center gap-5 hover:shadow-md transition">

        <!-- ICON / INITIAL -->
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center"
             [ngClass]="{
               'bg-indigo-50 text-indigo-600': s.role === 'ADMIN',
               'bg-emerald-50 text-emerald-600': s.role === 'USER',
               'bg-amber-50 text-amber-600': s.role === 'SUPER_ADMIN'
             }">

          <span class="text-sm font-black">
            {{ s.role.charAt(0) }}
          </span>
        </div>

        <!-- TEXT -->
        <div>
          <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">
            {{ s.role }}
          </p>
          <p class="text-3xl font-black text-gray-900">
            {{ s.count }}
          </p>
        </div>

      </div>

      <!-- STATUS CARD -->

    </div>

  </div>
</div>
